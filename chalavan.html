<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHALAVAN ***!!!</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Righteous&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0008;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Righteous', cursive;
}

.bg {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 20% 30%, #ff006640 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, #7c00ff40 0%, transparent 60%),
    radial-gradient(ellipse 100% 50% at 50% 50%, #00ffcc15 0%, transparent 70%);
  animation: bgPulse 4s ease-in-out infinite alternate;
}

@keyframes bgPulse {
  0% { filter: hue-rotate(0deg) brightness(1); }
  100% { filter: hue-rotate(60deg) brightness(1.3); }
}

/* Grid lines */
.grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,0,200,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,200,0.08) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 8s linear infinite;
}
@keyframes gridMove {
  0% { transform: perspective(400px) rotateX(20deg) translateY(0); }
  100% { transform: perspective(400px) rotateX(20deg) translateY(60px); }
}

/* Stars */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.5); }
  100% { opacity: 1; transform: scale(1.5); }
}

.scene {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Shadow stack */
.shadow-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.main-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 40px;
}

.chalavan {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(72px, 16vw, 160px);
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  position: relative;
  z-index: 2;

  /* Chrome text */
  background: linear-gradient(
    180deg,
    #ffffff 0%,
    #ffee00 15%,
    #ff6600 30%,
    #ff0066 45%,
    #cc00ff 60%,
    #00ccff 75%,
    #00ff88 90%,
    #ffee00 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 100% 200%;
  animation: 
    chromaScroll 2s linear infinite,
    wobble 3s ease-in-out infinite,
    scaleBreath 2.5s ease-in-out infinite;

  filter: drop-shadow(0 0 30px #ff006699) drop-shadow(0 0 60px #7c00ff66);
}

@keyframes chromaScroll {
  0% { background-position: 0% 0%; }
  100% { background-position: 0% 200%; }
}
@keyframes wobble {
  0%, 100% { transform: rotate(-2deg) skewX(-2deg); }
  25% { transform: rotate(2deg) skewX(2deg); }
  50% { transform: rotate(-1deg) skewX(1deg); }
  75% { transform: rotate(3deg) skewX(-1deg); }
}
@keyframes scaleBreath {
  0%, 100% { letter-spacing: 0.05em; }
  50% { letter-spacing: 0.12em; }
}

/* Shadow layers */
.sh1 { color: #ff0066; font-family: 'Boogaloo', cursive; font-size: clamp(72px, 16vw, 160px); text-transform: uppercase; transform: translate(6px, 6px); opacity: 0.7; animation: shadowDance1 1.5s ease-in-out infinite alternate; }
.sh2 { color: #7c00ff; font-family: 'Boogaloo', cursive; font-size: clamp(72px, 16vw, 160px); text-transform: uppercase; transform: translate(-6px, 8px); opacity: 0.5; animation: shadowDance2 2s ease-in-out infinite alternate; }
.sh3 { color: #00ffcc; font-family: 'Boogaloo', cursive; font-size: clamp(72px, 16vw, 160px); text-transform: uppercase; transform: translate(10px, -4px); opacity: 0.3; animation: shadowDance3 1.8s ease-in-out infinite alternate; }

@keyframes shadowDance1 { 0% { transform: translate(4px, 6px); } 100% { transform: translate(10px, 10px); } }
@keyframes shadowDance2 { 0% { transform: translate(-4px, 6px); } 100% { transform: translate(-12px, 12px); } }
@keyframes shadowDance3 { 0% { transform: translate(8px, -2px); } 100% { transform: translate(14px, -8px); } }

.exclaims {
  font-family: 'Righteous', cursive;
  font-size: clamp(36px, 8vw, 80px);
  color: #ffee00;
  text-shadow: 
    0 0 10px #ff6600,
    0 0 30px #ff0066,
    0 0 60px #ff006699;
  animation: exclamBounce 0.6s ease-in-out infinite alternate;
  letter-spacing: 0.2em;
  margin-top: -10px;
}
@keyframes exclamBounce {
  0% { transform: scale(1) translateY(0); }
  100% { transform: scale(1.15) translateY(-8px); }
}

/* Orbiting dots */
.orbit {
  position: absolute;
  width: 500px;
  height: 200px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.orb-dot {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform-origin: 0 0;
}
.orb-dot:nth-child(1) { background: #ff0066; box-shadow: 0 0 12px #ff0066; animation: orbitDot 2s linear infinite; }
.orb-dot:nth-child(2) { background: #ffee00; box-shadow: 0 0 12px #ffee00; animation: orbitDot 2s linear infinite; animation-delay: -0.5s; }
.orb-dot:nth-child(3) { background: #00ffcc; box-shadow: 0 0 12px #00ffcc; animation: orbitDot 2s linear infinite; animation-delay: -1s; }
.orb-dot:nth-child(4) { background: #cc00ff; box-shadow: 0 0 12px #cc00ff; animation: orbitDot 2s linear infinite; animation-delay: -1.5s; }

@keyframes orbitDot {
  0% { transform: rotate(0deg) translateX(260px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(260px) rotate(-360deg); }
}

/* Scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.15) 3px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* Glitch flash */
.glitch-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 99;
  animation: glitchFlash 5s step-start infinite;
}
@keyframes glitchFlash {
  0%, 90%, 100% { opacity: 0; }
  91% { background: rgba(255,0,102,0.1); opacity: 1; }
  92% { opacity: 0; }
  93% { background: rgba(0,255,204,0.1); opacity: 1; }
  94% { opacity: 0; }
}

/* Bottom tagline */
.tagline {
  font-family: 'Righteous', cursive;
  font-size: clamp(10px, 2vw, 16px);
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: #ff006688;
  margin-top: 16px;
  animation: taglinePulse 3s ease-in-out infinite;
}
@keyframes taglinePulse {
  0%, 100% { opacity: 0.4; color: #ff006688; }
  50% { opacity: 1; color: #00ffcccc; }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="scanlines"></div>
<div class="glitch-flash"></div>

<div class="stars" id="stars"></div>

<div class="scene">
  <div class="main-wrapper">
    <div class="orbit">
      <div class="orb-dot"></div>
      <div class="orb-dot"></div>
      <div class="orb-dot"></div>
      <div class="orb-dot"></div>
    </div>
    <div class="shadow-text"><span class="sh3">CHALAVAN</span></div>
    <div class="shadow-text"><span class="sh2">CHALAVAN</span></div>
    <div class="shadow-text"><span class="sh1">CHALAVAN</span></div>
    <span class="chalavan">CHALAVAN</span>
  </div>
  <div class="exclaims">! ! !</div>
  <div class="tagline">🔥 maximum funky energy 🔥</div>
</div>

<script>
// Generate stars
const stars = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 4 + 1;
  const colors = ['#ff0066','#ffee00','#00ffcc','#cc00ff','#00aaff','#ff6600'];
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    --d:${Math.random()*2+0.5}s;
    animation-delay:${Math.random()*3}s;
  `;
  stars.appendChild(s);
}
</script>
</body>
</html>
